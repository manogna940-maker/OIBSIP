plugins { id 'com.android.application' }

android {
    namespace 'com.oibsip.unitconverter'
    compileSdk 35

    defaultConfig {
        applicationId 'com.oibsip.unitconverter'
        minSdk 24
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
}
